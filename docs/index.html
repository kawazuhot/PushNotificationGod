<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PushNotificationGod</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #unity-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
      touch-action: none;
    }

    #unity-canvas {
      display: block;
      aspect-ratio: 9 / 16;
      width: auto;
      height: 100vh;
      height: 100dvh;
      max-width: 100vw;
      max-height: 100vh;
      max-height: 100dvh;
      background: #000;
      object-fit: contain;
      outline: none;
    }

    @media (max-aspect-ratio: 9 / 16) {
      #unity-canvas {
        width: 100vw;
        height: auto;
      }
    }

    #unity-loading-bar {
      position: absolute;
      left: 50%;
      bottom: 8vh;
      width: min(70vw, 360px);
      height: 8px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      overflow: hidden;
    }

    #unity-progress-bar-full {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: rgba(255, 255, 255, 0.88);
    }

    #unity-warning {
      position: absolute;
      left: 50%;
      top: 18px;
      max-width: min(86vw, 520px);
      transform: translateX(-50%);
      color: #fff;
      font-family: sans-serif;
      font-size: 14px;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" width="1080" height="1920" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-progress-bar-full"></div>
    </div>
    <div id="unity-warning"></div>
  </div>
  <script>
    const canvas = document.querySelector("#unity-canvas");
    const loadingBar = document.querySelector("#unity-loading-bar");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(message, type) {
      warningBanner.textContent = message;
      warningBanner.style.display = "block";
      if (type !== "error") {
        setTimeout(() => {
          warningBanner.style.display = "none";
        }, 5000);
      }
    }

    const buildUrl = "Build";
    const cacheBust = Date.now().toString();
    const withCacheBust = (url) => `${url}?v=${cacheBust}`;
    const loaderUrl = withCacheBust(buildUrl + "/WebGL.loader.js");
    const config = {
      dataUrl: withCacheBust(buildUrl + "/WebGL.data"),
      frameworkUrl: withCacheBust(buildUrl + "/WebGL.framework.js"),
      codeUrl: withCacheBust(buildUrl + "/WebGL.wasm"),
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "PushNotificationGod",
      productVersion: "1.0",
      showBanner: unityShowBanner,
      cacheControl: function () {
        return "no-store";
      }
    };

    const script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = `${100 * progress}%`;
      }).then((unityInstance) => {
        loadingBar.style.display = "none";
      }).catch((message) => {
        alert(message);
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
